<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Selection | AarogyaCare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light-bg);
            padding: 20px;
        }
        .auth-card {
            background: var(--white);
            padding: 50px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .role-selection {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }
        .role-btn {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #eee;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
        }
        .role-btn:hover {
            border-color: var(--primary-color);
            background: rgba(45, 90, 39, 0.05);
            transform: translateY(-3px);
        }
        .role-btn i {
            font-size: 2rem;
            color: var(--primary-color);
            width: 50px;
            text-align: center;
        }
        .role-info h3 {
            margin-bottom: 5px;
            font-size: 1.1rem;
        }
        .role-info p {
            font-size: 0.85rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-leaf"></i>
                <h2>Choose Your Portal</h2>
                <p>Please select your role to continue</p>
            </div>

            <div class="role-selection">
                <div class="role-btn" onclick="window.location.href='login-patient.html'">
                    <i class="fas fa-user-injured"></i>
                    <div class="role-info">
                        <h3>Continue as Patient</h3>
                        <p>Book appointments and view your health records.</p>
                    </div>
                </div>

                <div class="role-btn" onclick="window.location.href='login-doctor.html'">
                    <i class="fas fa-user-md"></i>
                    <div class="role-info">
                        <h3>Continue as Doctor</h3>
                        <p>Manage your patient queue and consultations.</p>
                    </div>
                </div>

                <div class="role-btn" onclick="window.location.href='login-admin.html'">
                    <i class="fas fa-user-shield"></i>
                    <div class="role-info">
                        <h3>Continue as Admin</h3>
                        <p>Manage hospital operations and reports.</p>
                    </div>
                </div>
            </div>

            <div class="auth-footer" style="margin-top: 40px;">
                <a href="index.html" style="font-size: 0.9rem;"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

</body>
</html>
